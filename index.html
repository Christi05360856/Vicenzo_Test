<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prophet Vincenzo — Elite Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #070b1f;
      --bg-mid: #0f1535;
      --accent-gold: #d4af37;
      --accent-gold-light: #f9d868;
      --text-main: #e2e8f0;
      --text-dim: #94a3b8;
      --glass: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.08);
      --correct: #10b981;
      --wrong: #ef4444;
      --skipped: #f59e0b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(ellipse at top, var(--bg-mid) 0%, var(--bg-deep) 100%) fixed;
      color: var(--text-main);
      min-height: 100vh;
    }
    .app-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .screen { display: none; animation: fadeIn 0.45s ease both; }
    .screen.active { display: block; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .hero {
      text-align: center;
      padding: 64px 28px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.45);
    }
    .hero h1 {
      font-family: 'Cinzel', serif;
      font-size: 3.2rem;
      background: linear-gradient(135deg, var(--accent-gold-light), var(--accent-gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .subtitle {
      font-size: 1.15rem;
      color: var(--text-dim);
      margin-bottom: 32px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .quiz-meta {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }
    .quiz-meta span {
      background: rgba(212, 175, 55, 0.08);
      border: 1px solid rgba(212, 175, 55, 0.2);
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 0.9rem;
      color: var(--accent-gold-light);
    }
    .btn-primary, .btn-secondary, .btn-success {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      border: none;
      padding: 14px 28px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 0.95rem;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-gold), #b8942a);
      color: #0a0e27;
      box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(212, 175, 55, 0.45);
    }
    .btn-secondary {
      background: var(--glass);
      color: var(--text-main);
      border: 1px solid var(--glass-border);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.08); }
    .btn-success {
      background: linear-gradient(135deg, var(--correct), #059669);
      color: #fff;
      box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
    }
    .btn-success:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(16, 185, 129, 0.4);
    }
    .hidden { display: none !important; }
    .quiz-header {
      display: grid;
      grid-template-columns: 72px 1fr 44px;
      align-items: center;
      gap: 18px;
      margin-bottom: 18px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      padding: 14px 18px;
      border-radius: 16px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .timer-container {
      position: relative;
      width: 60px;
      height: 60px;
    }
    .timer-ring {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }
    .timer-bg {
      fill: none;
      stroke: rgba(255,255,255,0.1);
      stroke-width: 6;
    }
    .timer-progress {
      fill: none;
      stroke: var(--accent-gold);
      stroke-width: 6;
      stroke-linecap: round;
      stroke-dasharray: 283;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear, stroke 0.3s;
    }
    .timer-text {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 0.8rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text-main);
    }
    .header-center { display: flex; flex-direction: column; gap: 8px; }
    .progress-container {
      height: 7px;
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent-gold), var(--accent-gold-light));
      border-radius: 999px;
      transition: width 0.35s ease;
    }
    .question-counter {
      font-weight: 600;
      color: var(--accent-gold-light);
      font-variant-numeric: tabular-nums;
      font-size: 0.9rem;
    }
    .nav-toggle {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-toggle:hover { background: rgba(255,255,255,0.08); }
    .nav-panel {
      margin-bottom: 16px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 14px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      animation: fadeIn 0.25s ease;
    }
    .nav-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 8px;
    }
    .nav-dot {
      aspect-ratio: 1;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.03);
      color: var(--text-dim);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-variant-numeric: tabular-nums;
    }
    .nav-dot.answered {
      background: rgba(16,185,129,0.18);
      color: var(--correct);
      border-color: rgba(16,185,129,0.4);
    }
    .nav-dot.current {
      box-shadow: 0 0 0 2px var(--accent-gold);
      color: #fff;
      border-color: var(--accent-gold);
    }
    .nav-dot:hover { transform: scale(1.08); }
    .question-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 32px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      margin-bottom: 22px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.35);
    }
    .question-text {
      font-family: 'Cinzel', serif;
      font-size: 1.3rem;
      line-height: 1.55;
      margin-bottom: 26px;
      color: #fff;
    }
    .options-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .option-btn {
      text-align: left;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      padding: 16px 18px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.98rem;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 12px;
      line-height: 1.4;
    }
    .option-btn::before {
      content: attr(data-label);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      font-size: 0.8rem;
      font-weight: 700;
      flex-shrink: 0;
      color: var(--text-dim);
    }
    .option-btn:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(212, 175, 55, 0.35);
      transform: translateX(5px);
    }
    .option-btn.selected {
      background: rgba(212, 175, 55, 0.12);
      border-color: var(--accent-gold);
      color: var(--accent-gold-light);
    }
    .option-btn.selected::before {
      background: var(--accent-gold);
      color: #0a0e27;
    }
    .quiz-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .results-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 44px 36px;
      text-align: center;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.45);
    }
    .results-card h2 {
      font-family: 'Cinzel', serif;
      font-size: 2.2rem;
      margin-bottom: 26px;
      color: var(--accent-gold-light);
    }
    .score-circle {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      background: conic-gradient(var(--accent-gold) var(--score-deg, 0deg), rgba(255,255,255,0.05) 0);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 34px;
      position: relative;
      box-shadow: 0 0 40px rgba(212,175,55,0.15);
    }
    .score-circle::before {
      content: '';
      position: absolute;
      width: 138px;
      height: 138px;
      border-radius: 50%;
      background: var(--bg-deep);
    }
    #score-percent {
      position: relative;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--accent-gold-light);
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-bottom: 32px;
    }
    .stat {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--glass-border);
      padding: 16px;
      border-radius: 12px;
      font-size: 0.9rem;
      color: var(--text-dim);
    }
    .stat span {
      display: block;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .stat:nth-child(1) span { color: var(--correct); }
    .stat:nth-child(2) span { color: var(--wrong); }
    .stat:nth-child(3) span { color: var(--skipped); }
    .stat:nth-child(4) span { color: var(--accent-gold-light); }
    .results-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .review-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .review-header h2 {
      font-family: 'Cinzel', serif;
      color: var(--accent-gold-light);
      font-size: 1.6rem;
    }
    .review-container {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: 72vh;
      overflow-y: auto;
      padding-right: 6px;
    }
    .review-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 20px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .review-card.correct   { border-left: 4px solid var(--correct); }
    .review-card.wrong     { border-left: 4px solid var(--wrong); }
    .review-card.skipped   { border-left: 4px solid var(--skipped); }
    .review-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }
    .review-top h3 {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.4;
      color: #fff;
    }
    .badge {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      white-space: nowrap;
    }
    .badge.correct   { background: rgba(16,185,129,0.12); color: var(--correct); }
    .badge.wrong     { background: rgba(239,68,68,0.12); color: var(--wrong); }
    .badge.skipped   { background: rgba(245,158,11,0.12); color: var(--skipped); }
    .review-opts {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }
    .review-opt {
      padding: 10px 14px;
      border-radius: 8px;
      background: rgba(255,255,255,0.03);
      border: 1px solid transparent;
      font-size: 0.92rem;
      color: var(--text-main);
    }
    .review-opt.correct-ans {
      border-color: var(--correct);
      background: rgba(16,185,129,0.1);
      color: #a7f3d0;
    }
    .review-opt.wrong-ans {
      border-color: var(--wrong);
      background: rgba(239,68,68,0.1);
      color: #fca5a5;
      text-decoration: line-through;
    }
    .review-exp {
      font-size: 0.88rem;
      color: var(--text-dim);
      line-height: 1.55;
      background: rgba(255,255,255,0.02);
      padding: 12px;
      border-radius: 8px;
      border-left: 3px solid var(--accent-gold);
    }
    ::-webkit-scrollbar { width: 7px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }
    @media (max-width: 640px) {
      .hero h1 { font-size: 2.2rem; }
      .quiz-header { grid-template-columns: 58px 1fr 40px; gap: 10px; padding: 12px; }
      .timer-container { width: 52px; height: 52px; }
      .timer-text { font-size: 0.72rem; }
      .nav-grid { grid-template-columns: repeat(5, 1fr); }
      .question-card { padding: 22px; }
      .question-text { font-size: 1.1rem; }
      .stats-grid { grid-template-columns: 1fr; }
      .results-card { padding: 28px 22px; }
      .score-circle { width: 140px; height: 140px; }
      .score-circle::before { width: 114px; height: 114px; }
      #score-percent { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <div class="app-container">

    <!-- LANDING SCREEN -->
    <div id="landing-screen" class="screen active">
      <div class="hero">
        <h1>Prophet Vincenzo</h1>
        <p class="subtitle">Elite MCQ Challenge</p>
        <div class="quiz-meta">
          <span>📚 50 Questions</span>
          <span>⏱️ 15 Minutes</span>
          <span>🔐 Crypto-Shuffled</span>
        </div>
        <button id="start-btn" class="btn-primary">Begin Quiz</button>
      </div>
    </div>

    <!-- QUIZ SCREEN -->
    <div id="quiz-screen" class="screen">
      <header class="quiz-header">
        <div class="timer-container" title="Time Remaining">
          <svg class="timer-ring" viewBox="0 0 100 100">
            <circle class="timer-bg" cx="50" cy="50" r="45" />
            <circle class="timer-progress" cx="50" cy="50" r="45" />
          </svg>
          <span id="timer-text" class="timer-text">15:00</span>
        </div>

        <div class="header-center">
          <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
          <div class="question-counter" id="question-counter">1 / 50</div>
        </div>

        <button id="nav-toggle" class="nav-toggle" title="Question Navigator">☰</button>
      </header>

      <div id="nav-panel" class="nav-panel hidden">
        <div class="nav-grid" id="nav-grid"></div>
      </div>

      <main class="quiz-main">
        <div id="question-card" class="question-card">
          <h2 id="question-text" class="question-text">Loading…</h2>
          <div id="options-container" class="options-container"></div>
        </div>
      </main>

      <footer class="quiz-footer">
        <button id="prev-btn" class="btn-secondary" disabled>← Previous</button>
        <button id="next-btn" class="btn-primary">Next →</button>
        <button id="submit-btn" class="btn-success hidden">Submit Quiz</button>
      </footer>
    </div>

    <!-- RESULTS SCREEN -->
    <div id="results-screen" class="screen">
      <div class="results-card">
        <h2>Quiz Complete</h2>
        <div class="score-circle" id="score-circle">
          <span id="score-percent">0%</span>
        </div>
        <div class="stats-grid">
          <div class="stat"><span id="stat-correct">0</span> Correct</div>
          <div class="stat"><span id="stat-wrong">0</span> Wrong</div>
          <div class="stat"><span id="stat-skipped">0</span> Skipped</div>
          <div class="stat"><span id="stat-time">00:00</span> Time Used</div>
        </div>
        <div class="results-actions">
          <button id="review-btn" class="btn-primary">Review Answers</button>
          <button id="restart-btn" class="btn-secondary">Try Again</button>
        </div>
      </div>
    </div>

    <!-- REVIEW SCREEN -->
    <div id="review-screen" class="screen">
      <header class="review-header">
        <h2>Answer Review</h2>
        <button id="close-review-btn" class="btn-secondary">← Back to Results</button>
      </header>
      <div id="review-container" class="review-container"></div>
    </div>

  </div>

  <!-- ===================== QUESTION DATA ===================== -->
  <script>
  window.ALL_QUESTIONS = [
    {
      id: 1,
      q: "How old is Vincenzo at the very beginning of the story?",
      opts: ["25 years old", "27 years old", "30 years old", "22 years old"],
      ans: 1,
      exp: "Vincenzo is 27 years old at the start of the story, while his sister Vita is 21."
    },
    {
      id: 2,
      q: "How many years had Vincenzo been serving God when the story opens?",
      opts: ["25 years", "27 years", "21 years", "22 years"],
      ans: 3,
      exp: "Vincenzo states: 'I've used 22 years of my life to serve God.'"
    },
    {
      id: 3,
      q: "What did Vincenzo's grandfather do even before Vincenzo was conceived?",
      opts: ["Prophesied he would be a great prophet", "Named him Vincenzo in a dream", "Donated him to God", "Had a vision of him healing the nations"],
      ans: 2,
      exp: "His grandad had donated him to God before he was even conceived in his mother's womb."
    },
    {
      id: 4,
      q: "Who jotted down the song Vincenzo sang in his sleep at the opening of the story?",
      opts: ["His mother, Dr. Jewel", "Hadassah", "Norabel", "Vita"],
      ans: 3,
      exp: "Vita came to his room, saw him singing in his sleep, then ran to his desk and jotted down the songs in a journal."
    },
    {
      id: 5,
      q: "What does the title 'Rav' mean, as Vincenzo uses it for Papa Noah?",
      opts: ["A close friend and prayer partner", "An elder or senior prophet", "A spiritual father chosen by God", "A rabbi — one who holds authority or acts as a personal mentor"],
      ans: 3,
      exp: "Vincenzo explains: 'Rav means a rabbi, one who holds a position of authority or who acts as a personal mentor.'"
    },
    {
      id: 6,
      q: "Why did Papa Noah insist Vincenzo remain in his parents' house despite owning more than ten mansions?",
      opts: ["To maintain humility as a man of God", "To stay close to his ministry base", "Because he was not emotionally strong enough to live alone", "To protect him from dangerous people"],
      ans: 2,
      exp: "The story states: 'Now I understand it all. I was not strong enough emotionally living alone.'"
    },
    {
      id: 7,
      q: "What is Vincenzo's mother widely known as, even after becoming a professor?",
      opts: ["Professor Nayel", "Mrs. Vincenzo", "Dr. Jewel", "Elder Jewel"],
      ans: 2,
      exp: "Even though mom has become a professor, she still prefers to be called Dr. Jewel."
    },
    {
      id: 8,
      q: "Which of Vincenzo's sisters is described as a professional singer with a 'euphonious voice'?",
      opts: ["Norabel", "Vita", "Mylah", "Hadassah"],
      ans: 3,
      exp: "Hadassah is described as a professional singer with a euphonious voice — beautiful, pleasant, and indeed a great singer."
    },
    {
      id: 9,
      q: "What is Vita's primary talent or calling in life?",
      opts: ["Singing and leading worship", "Playing the piano and composing", "Writing books, articles, and stories", "Marriage and family counseling"],
      ans: 2,
      exp: "Vita is a writer who always engages herself in writing books, articles, stories, etc."
    },
    {
      id: 10,
      q: "What is the name of the group of seven who always sing and pray together?",
      opts: ["The Holy Seven", "The Gospel Choir", "The Prayer Warriors", "The Septet"],
      ans: 3,
      exp: "Vincenzo states: 'We are Septet. Seven of us always sing and pray together.'"
    },
    {
      id: 11,
      q: "At what age did Hadassah and Vita both begin piano lessons?",
      opts: ["At age 5", "At age 9", "At age 10", "At age 7"],
      ans: 3,
      exp: "Both Hadassah and Vita started piano lessons at the age of 7 and are very good at it."
    },
    {
      id: 12,
      q: "Why was Vincenzo's hair never cut throughout his life?",
      opts: ["He personally vowed never to cut it as a sign of consecration", "God directly instructed him through a dream never to cut it", "His grandfather Renan told his mom not to cut it — it was the visible symbol of God's commitment to him", "It was a tradition in his grandfather's ministry"],
      ans: 2,
      exp: "Mom said: 'Your father, prophet Renan, told me before he died not to cut your hair. Your hair is the visible symbol of the commitment God made to you.'"
    },
    {
      id: 13,
      q: "In the novel, who does 'Senior Dad' refer to in Vincenzo's inner conversations?",
      opts: ["Vincenzo's biological father", "Papa Noah", "Prophet Renan (his grandfather)", "The Holy Spirit"],
      ans: 3,
      exp: "Throughout the story, 'Senior Dad' is the divine voice Vincenzo hears internally giving him instructions — representing the Holy Spirit."
    },
    {
      id: 14,
      q: "What city is Vincenzo's family home located in?",
      opts: ["Los Angeles, CA", "Atlanta, GA", "Chicago, IL", "Dallas, TX"],
      ans: 3,
      exp: "Vincenzo and his family are clearly based in Dallas, TX, USA."
    },

  <!-- ===================== APP LOGIC ===================== -->
  <script>
    /* ---------- Utilities ---------- */
    function cryptoShuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const buf = new Uint32Array(1);
        window.crypto.getRandomValues(buf);
        const j = buf[0] % (i + 1);
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60).toString().padStart(2, '0');
      const s = (seconds % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    /* ---------- State ---------- */
    let quizQuestions = [];
    let currentIndex = 0;
    let userAnswers = [];
    let timerInterval = null;
    const TOTAL_TIME = 15 * 60;

    /* ---------- DOM Refs ---------- */
    const screens = {
      landing: document.getElementById('landing-screen'),
      quiz:    document.getElementById('quiz-screen'),
      results: document.getElementById('results-screen'),
      review:  document.getElementById('review-screen')
    };

    const els = {
      timerText:      document.getElementById('timer-text'),
      timerRing:      document.querySelector('.timer-progress'),
      progressBar:    document.getElementById('progress-bar'),
      counter:        document.getElementById('question-counter'),
      questionText:   document.getElementById('question-text'),
      optionsBox:     document.getElementById('options-container'),
      prevBtn:        document.getElementById('prev-btn'),
      nextBtn:        document.getElementById('next-btn'),
      submitBtn:      document.getElementById('submit-btn'),
      navPanel:       document.getElementById('nav-panel'),
      navGrid:        document.getElementById('nav-grid'),
      scorePercent:   document.getElementById('score-percent'),
      scoreCircle:    document.getElementById('score-circle'),
      statCorrect:    document.getElementById('stat-correct'),
      statWrong:      document.getElementById('stat-wrong'),
      statSkipped:    document.getElementById('stat-skipped'),
      statTime:       document.getElementById('stat-time'),
      reviewBox:      document.getElementById('review-container')
    };

    /* ---------- Core Quiz Logic ---------- */
    function initQuiz() {
      if (!window.ALL_QUESTIONS || !Array.isArray(window.ALL_QUESTIONS)) {
        alert('Error: Question data not found.');
        return;
      }

      // 1. Shuffle full bank and pick 50
      const shuffledPool = cryptoShuffle(window.ALL_QUESTIONS);
      const selected = shuffledPool.slice(0, 50);

      // 2. Shuffle options within each question and remap correct index
      quizQuestions = selected.map(q => {
        const wrapped = q.opts.map((text, idx) => ({ text, originalIdx: idx }));
        const shuffledOpts = cryptoShuffle(wrapped);
        const newAns = shuffledOpts.findIndex(o => o.originalIdx === q.ans);
        return {
          id: q.id,
          q: q.q,
          opts: shuffledOpts.map(o => o.text),
          ans: newAns,
          exp: q.exp
        };
      });

      userAnswers = new Array(50).fill(null);
      currentIndex = 0;
      timeLeft = TOTAL_TIME;

      showScreen(screens.quiz);
      renderQuestion();
      renderNav();
      startTimer();
    }

    let timeLeft = TOTAL_TIME;

    function startTimer() {
      clearInterval(timerInterval);
      updateTimerUI();
      timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerUI();
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          finishQuiz(true);
        }
      }, 1000);
    }

    function updateTimerUI() {
      els.timerText.textContent = formatTime(timeLeft);
      const r = 45;
      const circumference = 2 * Math.PI * r;
      const offset = circumference - (timeLeft / TOTAL_TIME) * circumference;
      els.timerRing.style.strokeDashoffset = offset;

      if (timeLeft <= 60) els.timerRing.style.stroke = 'var(--wrong)';
      else if (timeLeft <= 300) els.timerRing.style.stroke = 'var(--skipped)';
      else els.timerRing.style.stroke = 'var(--accent-gold)';
    }

    function renderQuestion() {
      const q = quizQuestions[currentIndex];
      els.questionText.textContent = `${currentIndex + 1}. ${q.q}`;
      els.counter.textContent = `${currentIndex + 1} / 50`;

      els.optionsBox.innerHTML = '';
      q.opts.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.dataset.label = String.fromCharCode(65 + idx);
        btn.textContent = opt;
        if (userAnswers[currentIndex] === idx) btn.classList.add('selected');
        btn.addEventListener('click', () => selectOption(idx));
        els.optionsBox.appendChild(btn);
      });

      els.prevBtn.disabled = currentIndex === 0;

      if (currentIndex === 49) {
        els.nextBtn.classList.add('hidden');
        els.submitBtn.classList.remove('hidden');
      } else {
        els.nextBtn.classList.remove('hidden');
        els.submitBtn.classList.add('hidden');
      }

      updateProgress();
      updateNav();
    }

    function selectOption(idx) {
      userAnswers[currentIndex] = idx;
      renderQuestion();
      updateNav();
    }

    function nextQuestion() {
      if (currentIndex < 49) {
        currentIndex++;
        renderQuestion();
      }
    }

    function prevQuestion() {
      if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
      }
    }

    function updateProgress() {
      const answered = userAnswers.filter(a => a !== null).length;
      const pct = (answered / 50) * 100;
      els.progressBar.style.width = `${pct}%`;
    }

    /* ---------- Navigator ---------- */
    function renderNav() {
      els.navGrid.innerHTML = '';
      for (let i = 0; i < 50; i++) {
        const btn = document.createElement('button');
        btn.className = 'nav-dot';
        btn.textContent = i + 1;
        if (i === currentIndex) btn.classList.add('current');
        if (userAnswers[i] !== null) btn.classList.add('answered');
        btn.addEventListener('click', () => {
          currentIndex = i;
          renderQuestion();
        });
        els.navGrid.appendChild(btn);
      }
    }

    function updateNav() {
      const dots = els.navGrid.querySelectorAll('.nav-dot');
      dots.forEach((btn, i) => {
        btn.classList.toggle('current', i === currentIndex);
        btn.classList.toggle('answered', userAnswers[i] !== null);
      });
    }

    /* ---------- Finish & Results ---------- */
    function finishQuiz(timeExpired = false) {
      clearInterval(timerInterval);

      let correct = 0, wrong = 0, skipped = 0;
      quizQuestions.forEach((q, i) => {
        if (userAnswers[i] === null) skipped++;
        else if (userAnswers[i] === q.ans) correct++;
        else wrong++;
      });

      const scorePct = Math.round((correct / 50) * 100);
      const timeUsed = TOTAL_TIME - timeLeft;

      els.scorePercent.textContent = `${scorePct}%`;
      els.scoreCircle.style.setProperty('--score-deg', `${(scorePct / 100) * 360}deg`);

      els.statCorrect.textContent = correct;
      els.statWrong.textContent = wrong;
      els.statSkipped.textContent = skipped;
      els.statTime.textContent = formatTime(timeUsed);

      showScreen(screens.results);

      if (timeExpired) {
        setTimeout(() => alert('Time is up! Your quiz has been submitted automatically.'), 100);
      }
    }

    /* ---------- Review Mode ---------- */
    function showReview() {
      els.reviewBox.innerHTML = '';

      quizQuestions.forEach((q, i) => {
        const userAns = userAnswers[i];
        const isCorrect = userAns === q.ans;
        const isSkipped = userAns === null;

        const card = document.createElement('div');
        card.className = `review-card ${isSkipped ? 'skipped' : isCorrect ? 'correct' : 'wrong'}`;

        const badge = isSkipped
          ? '<span class="badge skipped">Skipped</span>'
          : isCorrect
            ? '<span class="badge correct">Correct</span>'
            : '<span class="badge wrong">Wrong</span>';

        const optsHtml = q.opts.map((opt, idx) => {
          let cls = '';
          if (idx === q.ans) cls = 'correct-ans';
          if (idx === userAns && !isCorrect) cls = 'wrong-ans';
          return `<div class="review-opt ${cls}">${String.fromCharCode(65 + idx)}. ${opt}</div>`;
        }).join('');

        card.innerHTML = `
          <div class="review-top">
            <h3>Q${i + 1}: ${q.q}</h3>
            ${badge}
          </div>
          <div class="review-opts">${optsHtml}</div>
          <div class="review-exp">${q.exp}</div>
        `;

        els.reviewBox.appendChild(card);
      });

      showScreen(screens.review);
    }

    /* ---------- Screen Helpers ---------- */
    function showScreen(screenEl) {
      Object.values(screens).forEach(s => s.classList.remove('active'));
      screenEl.classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /* ---------- Event Listeners ---------- */
    document.getElementById('start-btn').addEventListener('click', initQuiz);

    els.nextBtn.addEventListener('click', nextQuestion);
    els.prevBtn.addEventListener('click', prevQuestion);

    document.getElementById('nav-toggle').addEventListener('click', () => {
      els.navPanel.classList.toggle('hidden');
    });

    els.submitBtn.addEventListener('click', () => {
      const skipped = userAnswers.filter(a => a === null).length;
      if (skipped > 0) {
        const ok = confirm(`You have ${skipped} unanswered question(s). Submit anyway?`);
        if (!ok) return;
      }
      finishQuiz(false);
    });

    document.getElementById('review-btn').addEventListener('click', showReview);
    document.getElementById('close-review-btn').addEventListener('click', () => showScreen(screens.results));
    document.getElementById('restart-btn').addEventListener('click', () => {
      clearInterval(timerInterval);
      els.navPanel.classList.add('hidden');
      showScreen(screens.landing);
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (!screens.quiz.classList.contains('active')) return;

      if (e.key === 'ArrowRight') nextQuestion();
      if (e.key === 'ArrowLeft') prevQuestion();
      if (['1', '2', '3', '4'].includes(e.key)) {
        selectOption(parseInt(e.key) - 1);
      }
    });
  </script>
